name: Regenerate Portal from Drive

# Her 15 dakikada bir Google Drive'i tara, index.html'i yeniden uret,
# degisiklik varsa main branch'a commit et.
# GitHub Pages main branch'tan serve ettigi icin push = deploy.

on:
  schedule:
    # cron: minute hour day month weekday  (UTC)
    - cron: '*/15 * * * *'
  # Actions -> "Regenerate Portal from Drive" -> "Run workflow" ile manuel de tetiklenir
  workflow_dispatch:

# Workflow'un repo'ya yazma izni gerek
permissions:
  contents: write

concurrency:
  group: regenerate-portal
  cancel-in-progress: false

jobs:
  regenerate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Commit'leyebilmek icin default GITHUB_TOKEN ile checkout
          persist-credentials: true
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Collect Drive links
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DRIVE_ROOT_FOLDER_ID: ${{ secrets.DRIVE_ROOT_FOLDER_ID }}
          DRIVE_ROOT_FOLDER_NAME: 'OPCO Portal Documents'
          OUTPUT_CSV: drive_links.csv
        run: |
          python scripts/collect_drive_links.py

      - name: Regenerate index.html
        env:
          HTML_FILE: index.html
          CSV_FILE: drive_links.csv
        run: |
          python scripts/generate_html.py

      - name: Commit & push if changed
        run: |
          set -e
          git config user.name  "opco-portal-bot"
          git config user.email "opco-portal-bot@users.noreply.github.com"

          # Sadece index.html'i stage et. drive_links.csv isteyene bakacak cache,
          # repo'da tutmamak daha temiz. Ihtiyac olursa bu satiri git add drive_links.csv olarak degistir.
          git add index.html

          if git diff --cached --quiet; then
            echo "No changes — nothing to commit."
            exit 0
          fi

          TIMESTAMP="$(date -u '+%Y-%m-%d %H:%M UTC')"
          git commit -m "auto: regenerate portal ($TIMESTAMP)"
          git push
